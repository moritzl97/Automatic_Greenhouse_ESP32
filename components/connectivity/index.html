<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌱 Greenhouse Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
            color: white;
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        .readings { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; max-width: 800px; width: 100%; }
        .reading-card { 
            background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(10px); 
            border-radius: 20px; 
            padding: 25px; 
            text-align: center; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        .reading-card:hover { transform: translateY(-5px); }
        .reading-card.inactive { opacity: 0.4; }
        .reading-value { font-size: 2.5em; font-weight: bold; margin: 10px 0; }
        .reading-label { font-size: 1.1em; opacity: 0.9; text-transform: uppercase; letter-spacing: 1px; }
        .reading-sublabel { font-size: 0.85em; opacity: 0.7; margin-top: 4px; }
        .section-title { 
            max-width: 800px; width: 100%; 
            font-size: 1.1em; 
            opacity: 0.8; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin: 20px 0 10px 0; 
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌱 Greenhouse Monitor</h1>
        <div>Live sensor data</div>
    </div>

    <div class="readings">
        <div class="reading-card">
            <div class="reading-value" id="temp">--°C</div>
            <div class="reading-label">Temperature</div>
        </div>
        <div class="reading-card">
            <div class="reading-value" id="hum">--%</div>
            <div class="reading-label">Humidity</div>
        </div>
        <div class="reading-card">
            <div class="reading-value" id="light">--%</div>
            <div class="reading-label">Light Intensity</div>
        </div>
    </div>

    <div class="section-title">Soil Moisture</div>

    <div class="readings" id="pots-grid">
        <!-- filled by JS -->
    </div>

    <div style="margin-top: 30px; display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;">
        <button id="light-btn" onclick="cycleLight()" style="padding: 15px 25px; font-size: 1.1em; background: #2196F3; color: white; border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
            Growlight <span id="light-state">AUTO</span>
        </button>
    </div>

    <script>
        async function updateReadings() {
            try {
                const response = await fetch('/data');
                const data = await response.json();

                document.getElementById('temp').textContent  = data.temperature_C.toFixed(1) + '°C';
                document.getElementById('hum').textContent   = data.relative_humidity_pct.toFixed(1) + '%';
                document.getElementById('light').textContent = data.light_intensity_pct.toFixed(1) + '%';

                const grid = document.getElementById('pots-grid');
                grid.innerHTML = '';
                data.pots.forEach(pot => {
                    const card = document.createElement('div');
                    card.className = 'reading-card' + (pot.active ? '' : ' inactive');
                    card.innerHTML = `
                        <div class="reading-value">${pot.active ? pot.soil_moisture_pct.toFixed(1) + '%' : '—'}</div>
                        <div class="reading-label">${pot.name}</div>
                        <div class="reading-sublabel">${pot.active ? 'Soil Moisture' : 'Inactive'}</div>
                    `;
                    grid.appendChild(card);
                });

            } catch(e) { console.error('Update failed:', e); }
        }

        let lightState = 0;
        const stateNames = ['AUTO', 'ON', 'OFF'];
        const Colors = ['#2196F3', '#4CAF50', '#F44336'];

        async function cycleLight() {
            lightState = (lightState + 1) % 3;
            document.getElementById('light-state').textContent = stateNames[lightState];
            document.getElementById('light-btn').style.background = Colors[lightState];
            if (lightState === 0) {
                await fetch('/config', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ growlight_override: false })
                });
            } else {
                await fetch('/config', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ growlight_override: true, growlight: lightState === 1 })
                });
            }
        }

        async function loadHistory() {
            const url = `${FIREBASE_DB_URL}/measurements.json?orderBy="$key"&limitToLast=20`;
            const response = await fetch(url);
            const data = await response.json();
            const entries = Object.values(data);
            // entries is an array of your measurement objects, newest last
            console.log(entries);
            // plot or display as needed
        }

        setInterval(updateReadings, 3000);
        updateReadings();
    </script>
</body>
</html>
